name: Security Scans
on: workflow_call

permissions: read-all

jobs:
  sectets:
    name: 1. Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - uses:  actions/checkout@v6
        with:
          fetch-depth: '0'
      - uses: gitleaks/gitleaks-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast:
    name: 2A Semgrep SAST
    needs: sectets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install semgrep
      - run: semgrep scan --config security-rules/semgrep-local.yaml --error

  iac:
    name: 2B. Ceckov IaC
    needs: sectets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bridgecrewio/checkov-action@master
        with:
            directory: .
            skip_path: venv
